<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#25d1f4",
                        "background-light": "#f5f8f8",
                        "background-dark": "#101f22",
                        "navy-custom": "#003366",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Oasis Water - Add Address</title>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Background Content (Dimmed Checkout Page) -->
<div class="fixed inset-0 z-0 opacity-40 pointer-events-none">
<div class="layout-container flex h-full flex-col">
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 px-10 py-4 bg-white dark:bg-slate-900">
<div class="flex items-center gap-4 text-navy-custom dark:text-primary">
<div class="size-6">
<svg fill="currentColor" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M44 4H30.6666V17.3334H17.3334V30.6666H4V44H44V4Z"></path>
</svg>
</div>
<h2 class="text-xl font-bold leading-tight">Oasis Water</h2>
</div>
<div class="flex gap-4">
<div class="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-700"></div>
</div>
</header>
<main class="p-10 max-w-4xl mx-auto w-full">
<div class="h-8 w-48 bg-slate-200 dark:bg-slate-700 rounded mb-8"></div>
<div class="space-y-4">
<div class="h-24 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 p-4"></div>
<div class="h-24 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 p-4"></div>
<div class="h-48 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 p-4"></div>
</div>
</main>
</div>
</div>
<!-- Modal Backdrop -->
<div class="fixed inset-0 z-10 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 sm:p-6">
<!-- Modal Container -->
<div class="bg-white dark:bg-slate-900 w-full max-w-[520px] rounded-xl shadow-2xl overflow-hidden flex flex-col">
<!-- Modal Header -->
<header class="flex items-center justify-between px-6 py-5 border-b border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-2xl">location_on</span>
<h2 class="text-navy-custom dark:text-slate-100 text-xl font-bold tracking-tight">Add New Address</h2>
</div>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Modal Body / Form -->
<div class="p-6 overflow-y-auto max-h-[80vh]">
<form class="space-y-5">
<!-- Street Address -->
<div class="flex flex-col gap-1.5">
<label class="text-navy-custom dark:text-slate-300 text-sm font-semibold">Street Address</label>
<div class="relative">
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary py-3 px-4 placeholder:text-slate-400" placeholder="e.g. 123 Water Way" type="text"/>
</div>
</div>
<!-- Suburb & City Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-navy-custom dark:text-slate-300 text-sm font-semibold">Suburb</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary py-3 px-4 placeholder:text-slate-400" placeholder="Spring Valley" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-navy-custom dark:text-slate-300 text-sm font-semibold">City</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary py-3 px-4 placeholder:text-slate-400" placeholder="Cape Town" type="text"/>
</div>
</div>
<!-- Map Preview Placeholder -->
<div class="w-full h-32 rounded-lg overflow-hidden relative border border-slate-200 dark:border-slate-700">
<img class="w-full h-full object-cover grayscale-[0.5] contrast-[0.8]" data-alt="Map view showing the selected location" data-location="Cape Town" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCzGgTRGl-O4MAyCP2kYHUiZFVPCsdFtdp5gqojPTP-5nQkx-RcGEmD-8Nj9kfTfOHvkItmIenevn7fnqZ1uU_o6WLzah8s8Qk1nPgXCoYZwC8oT6p04koMhGoYLqgH2uxDBrX-Q0rYfV_ydWlbEts2BemOXQIbyNDszZGGcwJyjC-Vc_XDMSc8clpwvhcRtx-O2m43-2w0iFchonC5c5gQmwy532IKCG1qN_9nePUBO3vNN527E_Uil6vRwQ0eEq_nlJewIfsM0IKv"/>
<div class="absolute inset-0 flex items-center justify-center">
<div class="bg-white/90 dark:bg-slate-900/90 p-2 rounded-lg shadow-lg">
<span class="material-symbols-outlined text-primary">push_pin</span>
</div>
</div>
</div>
<!-- Delivery Notes -->
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center">
<label class="text-navy-custom dark:text-slate-300 text-sm font-semibold">Delivery Notes</label>
<span class="text-xs text-slate-400 font-medium">Optional</span>
</div>
<textarea class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary py-3 px-4 placeholder:text-slate-400 resize-none" placeholder="Gate code, drop-off instructions, etc." rows="3"></textarea>
</div>
<!-- Save as Default Checkbox -->
<div class="flex items-center gap-3 pt-2">
<label class="flex items-center gap-3 cursor-pointer group">
<input checked="" class="w-5 h-5 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary dark:bg-slate-800 transition-colors pointer-events-none" type="checkbox"/>
<span class="text-sm font-medium text-navy-custom dark:text-slate-300 group-hover:text-primary transition-colors">
            Save as default address
        </span>
</label>
</div></form>
</div>
<!-- Modal Footer -->
<footer class="p-6 border-t border-slate-100 dark:border-slate-800 flex flex-col sm:flex-row gap-3">
<button class="flex-1 px-6 py-3.5 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-bold rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                    Cancel
                </button>
<button class="flex-1 px-6 py-3.5 bg-primary text-white font-bold rounded-lg hover:brightness-110 shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl">save</span>
                    Save Address
                </button>
</footer>
</div>
</div>
</body></html>
