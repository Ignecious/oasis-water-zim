<!-- Top Navigation Bar (Pinned) -->
<app-top-nav-bar></app-top-nav-bar>

<!-- Sticky Header -->
<app-sticky-header></app-sticky-header>

<!-- Main Content -->
<main class="products-main">
  <div class="products-container">
    
    <!-- Page Header -->
    <div class="page-header">
      <h1>Our Products</h1>
      <p class="subtitle">Discover our range of premium water, ice, and accessories</p>
    </div>

    <!-- Category Filters -->
    <div class="category-filters">
      <button 
        *ngFor="let category of categories"
        pButton 
        [label]="category.label"
        class="category-btn"
        [ngClass]="{'active': selectedCategory === category.value}"
        (click)="selectCategory(category.value)">
      </button>
    </div>

    <!-- Products Grid -->
    <div class="products-grid" *ngIf="filteredProducts.length > 0">
      <div *ngFor="let product of filteredProducts; let i = index" class="product-card-wrapper">
        <p-card styleClass="product-card">
          <ng-template pTemplate="header">
            <div class="product-image-container">
              <img 
                [src]="product.image" 
                [alt]="product.name"
                class="product-img">
              <span *ngIf="getBestSellerBadge(i)" class="best-seller-badge">Best Seller</span>
            </div>
          </ng-template>
          
          <div class="product-body">
            <div class="product-header">
              <h3>{{ product.name }}</h3>
              <span class="price">${{ product.price.toFixed(2) }}</span>
            </div>
            <p class="product-desc">{{ product.size }}</p>
          </div>

          <ng-template pTemplate="footer">
            <div class="product-footer">
              <!-- Add to Cart Button (when not in cart) -->
              <button 
                *ngIf="getItemQuantity(product.id) === 0"
                pButton 
                label="Add to Cart" 
                icon="pi pi-shopping-cart"
                class="add-cart-btn"
                [ngClass]="{'adding': isAddingToCart(product.id)}"
                (click)="addToCart(product, $event)">
              </button>
              
              <!-- Quantity Controls (when in cart) -->
              <div *ngIf="getItemQuantity(product.id) > 0" class="quantity-controls">
                <button 
                  pButton 
                  icon="pi pi-minus" 
                  class="p-button-rounded p-button-sm quantity-btn"
                  (click)="decreaseQuantity(product.id)">
                </button>
                <input 
                  type="number" 
                  class="quantity-input"
                  [value]="getItemQuantity(product.id)"
                  (change)="updateQuantity(product.id, $event)"
                  (blur)="validateQuantity(product.id, $event)"
                  min="1"
                  step="1">
                <button 
                  pButton 
                  icon="pi pi-plus" 
                  class="p-button-rounded p-button-sm quantity-btn"
                  (click)="increaseQuantity(product.id)">
                </button>
              </div>
            </div>
          </ng-template>
        </p-card>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="filteredProducts.length === 0">
      <i class="pi pi-inbox empty-icon"></i>
      <h2>No Products Found</h2>
      <p>Try adjusting your search or filter to find what you're looking for.</p>
      <button 
        pButton 
        label="View All Products" 
        class="p-button-outlined"
        (click)="selectCategory('all'); searchQuery = ''; onSearchChange()">
      </button>
    </div>

  </div>
</main>

<!-- Footer -->
<app-footer-new></app-footer-new>
