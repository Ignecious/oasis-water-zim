<header class="sticky-header">
  <div class="header-content">
    <div class="header-left">
      <div class="logo">
        <i class="pi pi-circle-fill water-icon"></i>
        <h2>Oasis Water</h2>
      </div>
      <nav class="main-nav">
        <a routerLink="/" class="nav-link">Home</a>
        <a routerLink="/products" class="nav-link">Products</a>
      </nav>
    </div>
    <div class="header-right">
      <div class="search-box">
        <i class="pi pi-search"></i>
        <input type="text" placeholder="Search for product..." />
      </div>
      <div class="header-actions">
        <button 
          pButton 
          icon="pi pi-shopping-cart" 
          class="p-button-rounded p-button-text cart-btn"
          routerLink="/cart">
          <span *ngIf="cartItemCount > 0" class="cart-count-badge">{{ cartItemCount }}</span>
        </button>
        <button 
          pButton 
          icon="pi pi-user" 
          class="p-button-rounded p-button-text user-btn"
          (click)="toggleUserMenu($event)">
        </button>
        <p-menu 
          #userMenu 
          [model]="userMenuItems" 
          [popup]="true" 
          styleClass="user-menu-overlay">
        </p-menu>
      </div>
    </div>
  </div>
</header>
